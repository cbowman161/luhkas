# Drop-in: vault-runtime is a *user* unit and `After=ollama.service` does NOT
# cross the user/system namespace boundary, so vault_service.py starts before
# ollama is listening on 127.0.0.1:11434. Its one-shot model warmup then fails
# with "Connection refused" and the cached failure is exposed via /health for
# the entire boot.
#
# Poll the ollama port for up to 60s before starting, so the live warmup
# succeeds against a ready ollama. Mirror this on disk to
# ~/.config/systemd/user/vault-runtime.service.d/ on vault (installer should
# do this; see vault/install_vault_service.py).
[Service]
ExecStartPre=/bin/bash -c 'for i in {1..120}; do (echo > /dev/tcp/127.0.0.1/11434) >/dev/null 2>&1 && exit 0; sleep 0.5; done; echo "ollama did not become ready in 60s" >&2; exit 1'
